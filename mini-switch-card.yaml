type: custom:button-card
entity: input_boolean.misafir_modu
name: Misafir
show_name: true
show_icon: true
tap_action:
  action: more-info
layout: icon_name
styles:
  card:
    - border-radius: 0px
    - border: none
    - box-shadow: none
    - padding: 0px 2px
    - background: none
    - height: 100%
    - margin-left: 7px
    - switch-checked-color: null
  grid:
    - grid-template-areas: "\"i n switch\""
    - grid-template-columns: 18px 36px 21px
    - column-gap: 5px
    - align-items: center
  img_cell:
    - place-self: center
    - width: 20px
    - height: 20px
  icon:
    - width: 20px
    - height: 20px
    - color: var(--primary-color)
  name:
    - font-size: 11px
    - font-weight: 500
    - justify-self: start
    - white-space: nowrap
    - color: var(--primary-text-color)
  custom_fields:
    switch:
      - justify-self: end
      - margin-right: "-6px"
      - margin-top: 3px
custom_fields:
  switch:
    card:
      type: entities
      entities:
        - entity: input_boolean.misafir_modu
          name: " "
          icon: mdi:none
          secondary_info: none
          card_mod:
            style:
              hui-generic-entity-row:
                $: >
                  state-badge, .info { display: none !important; } :host { 
                  padding: 0 !important; margin: 0 !important;  border: none
                  !important;               }
              ha-entity-toggle:
                $: >
                  ha-switch {
                    /* Açık olduğunda Ray rengi */
                    --switch-checked-track-color: #34c759 !important;
                    --mdc-switch-selected-track-color: #34c759 !important;              
                    /* Açık olduğunda Yuvarlak (Thumb) rengi */
                    --switch-checked-button-color: #34c759 !important;
                    --mdc-switch-selected-handle-color: white !important;        
                    /* Boyut ve Hizalama */
                    transform: scale(0.7);
                    transform-origin: right center;
                    padding: 0 !important;
                    margin: 0 !important;
                  }         /* Eski seçicileri temizleyip sadece değişkenleri
                  kullanmak daha stabildir */

                        
      card_mod:
        style: |
          ha-card {
            background: none !important;
            border: none !important;
            box-shadow: none !important;
            padding: 0 !important;
          }
          #states { padding: 0 !important; overflow :hidden }
