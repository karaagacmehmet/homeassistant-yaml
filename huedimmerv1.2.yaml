blueprint:
  name: "Z2M - Philips Hue Dimmer (Tam Liste)"
  description: "Zigbee2MQTT Philips Hue Dimmer için 16 farklı aksiyonun tamamını destekler."
  domain: automation
  input:
    remote_sensor:
      name: "Hue Dimmer Action Sensor"
      description: "Cihazın 'action' sensörünü seçin."
      selector:
        entity:
    # ON BUTTON
    on_press:
      name: "On - Press"
      default: []
      selector: { action: {} }
    on_press_release:
      name: "On - Press Release"
      default: []
      selector: { action: {} }
    on_hold:
      name: "On - Hold"
      default: []
      selector: { action: {} }
    on_hold_release:
      name: "On - Hold Release"
      default: []
      selector: { action: {} }
    # UP BUTTON
    up_press:
      name: "Up - Press"
      default: []
      selector: { action: {} }
    up_press_release:
      name: "Up - Press Release"
      default: []
      selector: { action: {} }
    up_hold:
      name: "Up - Hold"
      default: []
      selector: { action: {} }
    up_hold_release:
      name: "Up - Hold Release"
      default: []
      selector: { action: {} }
    # DOWN BUTTON
    down_press:
      name: "Down - Press"
      default: []
      selector: { action: {} }
    down_press_release:
      name: "Down - Press Release"
      default: []
      selector: { action: {} }
    down_hold:
      name: "Down - Hold"
      default: []
      selector: { action: {} }
    down_hold_release:
      name: "Down - Hold Release"
      default: []
      selector: { action: {} }
    # OFF BUTTON
    off_press:
      name: "Off - Press"
      default: []
      selector: { action: {} }
    off_press_release:
      name: "Off - Press Release"
      default: []
      selector: { action: {} }
    off_hold:
      name: "Off - Hold"
      default: []
      selector: { action: {} }
    off_hold_release:
      name: "Off - Hold Release"
      default: []
      selector: { action: {} }

mode: restart
max_exceeded: silent

trigger:
  - platform: state
    entity_id: !input remote_sensor
    # Boş durumları tetiklememesi için (to_state null değilse)
    not_from:
      - unknown
      - unavailable

action:
  - variables:
      command: "{{ trigger.to_state.state }}"
  - choose:
      # ON
      - conditions: "{{ command == 'on_press' }}"
        sequence: !input on_press
      - conditions: "{{ command == 'on_press_release' }}"
        sequence: !input on_press_release
      - conditions: "{{ command == 'on_hold' }}"
        sequence: !input on_hold
      - conditions: "{{ command == 'on_hold_release' }}"
        sequence: !input on_hold_release
      # UP
      - conditions: "{{ command == 'up_press' }}"
        sequence: !input up_press
      - conditions: "{{ command == 'up_press_release' }}"
        sequence: !input up_press_release
      - conditions: "{{ command == 'up_hold' }}"
        sequence: !input up_hold
      - conditions: "{{ command == 'up_hold_release' }}"
        sequence: !input up_hold_release
      # DOWN
      - conditions: "{{ command == 'down_press' }}"
        sequence: !input down_press
      - conditions: "{{ command == 'down_press_release' }}"
        sequence: !input down_press_release
      - conditions: "{{ command == 'down_hold' }}"
        sequence: !input down_hold
      - conditions: "{{ command == 'down_hold_release' }}"
        sequence: !input down_hold_release
      # OFF
      - conditions: "{{ command == 'off_press' }}"
        sequence: !input off_press
      - conditions: "{{ command == 'off_press_release' }}"
        sequence: !input off_press_release
      - conditions: "{{ command == 'off_hold' }}"
        sequence: !input off_hold
      - conditions: "{{ command == 'off_hold_release' }}"
        sequence: !input off_hold_release
